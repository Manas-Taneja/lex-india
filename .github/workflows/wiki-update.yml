# .github/workflows/wiki-update.yml
name: Wiki Update

on:
  workflow_run:
    workflows: ["Daily Scrape"]
    types: [completed]
  workflow_dispatch:

jobs:
  wiki:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate/update wiki pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/wiki_gen.py

      - name: Commit wiki changes
        run: |
          git config user.name "lex-india-bot"
          git config user.email "bot@lex-india"
          git add wiki/
          git diff --staged --quiet || git commit -m "wiki: auto-update $(date +%Y-%m-%d)"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
